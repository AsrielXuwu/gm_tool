name: GM Tool Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ] 
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-15-intel, macos-14]
        include:
          - os: windows-latest
            artifact_name: GMTool-Windows
            output_name: GM_Tool.exe
          - os: macos-15-intel
            artifact_name: GMTool-macOS-Intel
            output_name: GM_Tool.app
          - os: macos-14
            artifact_name: GMTool-macOS-AppleSilicon
            output_name: GM_Tool.app

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 移除了 base64，加入了 tiktoken
        pip install pyinstaller openpyxl openai tiktoken

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # 注意：请将 gm_tool.pyw 替换为你真实的 Python 脚本名
        pyinstaller --noconsole --onefile --name "GM_Tool" gm_tool.pyw

    - name: Build with PyInstaller (macOS)
      if: startsWith(matrix.os, 'macos')
      run: |
        # 注意：请将 gm_tool.pyw 替换为你真实的 Python 脚本名
        pyinstaller --windowed --name "GM_Tool" gm_tool.pyw

    - name: Prepare Artifacts
      shell: bash
      run: |
        mkdir -p release_dist
        if [[ "${{ matrix.os }}" == windows* ]]; then
          cp dist/GM_Tool.exe release_dist/${{ matrix.artifact_name }}.exe
        else
          cd dist
          zip -r ../release_dist/${{ matrix.artifact_name }}.zip GM_Tool.app
          cd ..
        fi

    - name: Upload artifact to Actions
      uses: actions/upload-artifact@v4
      with:
        name: raw-${{ matrix.artifact_name }}
        path: release_dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          path: final-artifacts
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: final-artifacts/*
          generate_release_notes: true
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-build' }}